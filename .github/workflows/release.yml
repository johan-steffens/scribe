name: Check, Build, and Release

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    paths:
      - src/**
      - Cargo.toml
      - Cargo.lock
  workflow_dispatch:

jobs:
  preflight:
    name: Preflight checks
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.validate.outputs.version }}
      is_release: ${{ steps.validate.outputs.is_release }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate version and check tag existence
        id: validate
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(cargo metadata --format-version=1 --no-deps | jq -r '.packages[0].version')
          echo "Found version $VERSION in Cargo.toml"

          # Determine if this is a release build (push to main or workflow_dispatch)
          IS_RELEASE=false
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]] || \
             [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            IS_RELEASE=true
            # Check tag existence only for release builds
            if gh release view "v$VERSION" >/dev/null 2>&1; then
              echo "::error::Tag v$VERSION already exists."
              exit 1
            fi
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "is_release=$IS_RELEASE" >> "$GITHUB_OUTPUT"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install clippy and rustfmt
        run: rustup component add clippy rustfmt

      - name: Run checks
        run: |
          cargo fmt --all -- --check
          cargo clippy --all-targets --all-features -- -D warnings

  build:
    name: Build — ${{ matrix.target }}
    needs: preflight
    if: needs.preflight.outputs.is_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 (static musl — no glibc dependency)
          - target: x86_64-unknown-linux-musl
            os: ubuntu-24.04
            artifact: scribe-linux-x86_64

          # macOS Apple Silicon (arm64)
          - target: aarch64-apple-darwin
            os: macos-15
            artifact: scribe-macos-aarch64

          # Windows x86_64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: scribe-windows-x86_64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux only)
        if: matrix.os == 'ubuntu-24.04'
        run: sudo apt-get install -y musl-tools

      - name: Cache Cargo registry and build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ matrix.target }}-cargo-

      - name: Build release binary (with MCP and sync features)
        shell: bash
        run: |
          cargo build \
            --release \
            --locked \
            --features mcp,sync \
            --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          if [ "${{ runner.os }}" == "Windows" ]; then
            cp target/${{ matrix.target }}/release/scribe.exe ${{ matrix.artifact }}
          else
            cp target/${{ matrix.target }}/release/scribe ${{ matrix.artifact }}
          fi

      - name: Upload binary artefact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: [preflight, build]
    if: needs.preflight.outputs.is_release == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout main (for release notes context)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Download all build artefacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Generate SHA-256 checksums
        working-directory: dist
        run: |
          sha256sum scribe-linux-x86_64 scribe-macos-aarch64 scribe-windows-x86_64.exe \
            > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Generate release notes from conventional commits
        id: release-notes
        env:
          VERSION: v${{ needs.preflight.outputs.version }}
        run: |
          # Get the last tag to compare against
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "Last tag: $LAST_TAG"

          # Parse conventional commits since last tag
          CHANGELOG=""
          if [[ -n "$LAST_TAG" ]]; then
            # Collect commits between last tag and this version
            CHANGELOG=$(git log --format="|%s" "$LAST_TAG..HEAD" 2>/dev/null | grep "^|" || true)
          fi

          # Build categorized changelog
          FEATURES=""
          FIXES=""
          OTHER=""
          while IFS= read -r line; do
            commit=${line:1}  # Remove leading |
            # Extract description after type(scope): or type:
            if [[ "$commit" =~ ^(feat|fix|docs|style|chore|refactor|perf)(\([a-zA-Z0-9_-]+\))?:[[:space:]](.*) ]]; then
              type="${BASH_REMATCH[1]}"
              desc="${BASH_REMATCH[3]}"
              case "$type" in
                feat) FEATURES="${FEATURES}- ${desc}\n" ;;
                fix)  FIXES="${FIXES}- ${desc}\n" ;;
                *)    OTHER="${OTHER}- [${type}] ${desc}\n" ;;
              esac
            elif [[ -n "$commit" ]]; then
              OTHER="${OTHER}- ${commit}\n"
            fi
          done <<< "$CHANGELOG"

          # Read checksums
          LINUX_SHA=$(grep scribe-linux-x86_64 SHA256SUMS.txt | cut -d' ' -f1)
          MACOS_SHA=$(grep scribe-macos-aarch64 SHA256SUMS.txt | cut -d' ' -f1)
          WIN_SHA=$(grep scribe-windows-x86_64.exe SHA256SUMS.txt | cut -d' ' -f1)

          # Generate release notes
          cat <<EOF > RELEASE_NOTES.md
            ## What's Changed

            **${{ needs.preflight.outputs.version }}** is a bug fix and feature release.

            ### New Features
            $(echo -e "${FEATURES:-_No new features in this release._}")

            ### Bug Fixes
            $(echo -e "${FIXES:-_No bug fixes in this release._}")

            ### Other Changes
            $(echo -e "${OTHER:-_No other changes in this release._}")

            ---

            ## Installation

            Download the binary for your platform, make it executable, and move it onto your \$PATH.

            \`\`\`sh
            # macOS (Apple Silicon)
            curl -Lo scribe https://github.com/${{ github.repository }}/releases/download/$VERSION/scribe-macos-aarch64
            chmod +x scribe && sudo mv scribe /usr/local/bin/

            # Linux (x86_64)
            curl -Lo scribe https://github.com/${{ github.repository }}/releases/download/$VERSION/scribe-linux-x86_64
            chmod +x scribe && sudo mv scribe /usr/local/bin/

            # Windows (x86_64)
            # Download 'scribe-windows-x86_64.exe' from the releases page.
            \`\`\`

            ### Shell Completions

            \`\`\`sh
            # zsh
            scribe completions zsh > ~/.zfunc/_scribe

            # zsh with Zim
            scribe completions zsh >! ~/.zim/modules/zsh-completions/src/_scribe
            rm -f ~/.zcompdump ~/.zcompdump.dat ~/.zcompdump.zwc && zimfw build

            # fish
            scribe completions fish > ~/.config/fish/completions/scribe.fish

            # bash
            scribe completions bash >> ~/.bash_completion
            \`\`\`

            ### MCP Server

            This binary includes the \`mcp\` and \`sync\` features. Run \`scribe mcp\` to
            start the MCP stdio server and connect it to your AI agent.

            ### Checksums

            \`\`\`
            linux-x86_64:   $LINUX_SHA
            macos-aarch64:  $MACOS_SHA
            windows-x86_64: $WIN_SHA
            \`\`\`

            **Full Changelog**: https://github.com/${{ github.repository }}/compare/$LAST_TAG...$VERSION
          EOF

          echo "Release notes generated:"
          cat RELEASE_NOTES.md

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: v${{ needs.preflight.outputs.version }}
        run: |
          gh release create "$VERSION" \
            --title "$VERSION" \
            --notes-file RELEASE_NOTES.md \
            dist/scribe-linux-x86_64 \
            dist/scribe-macos-aarch64 \
            dist/scribe-windows-x86_64.exe
