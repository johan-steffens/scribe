name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (overrides Cargo.toml)"
        required: false
        type: string

# Only allow this workflow to run against main.
# The job-level `if` below provides the enforcement with a clear failure
# message rather than a silent no-op.
jobs:
  preflight:
    name: Preflight checks
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.validate.outputs.version }}
    steps:
      - name: Enforce main branch
        if: github.ref != 'refs/heads/main'
        run: |
          echo "::error::This workflow may only be run from the main branch (got ${{ github.ref }})."
          exit 1

      - name: Validate version and check tag existence
        id: validate
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
            echo "Using provided version $VERSION"
          else
            VERSION=$(grep '^version = ' Cargo.toml | sed -E 's/version = "(.*)"/\1/')
            echo "Found version $VERSION in Cargo.toml"
          fi
          
          # Check tag existence (GH CLI)
          if gh release view "v$VERSION" >/dev/null 2>&1; then
            echo "::error::Tag v$VERSION already exists."
            exit 1
          fi
          
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install clippy and rustfmt
        run: rustup component add clippy rustfmt

      - name: Run checks
        run: |
          cargo fmt --all -- --check
          cargo clippy --all-targets --all-features -- -D warnings

  build:
    name: Build — ${{ matrix.target }}
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 (static musl — no glibc dependency)
          - target: x86_64-unknown-linux-musl
            os: ubuntu-24.04
            artifact: scribe-linux-x86_64

          # macOS Apple Silicon (arm64)
          - target: aarch64-apple-darwin
            os: macos-15
            artifact: scribe-macos-aarch64

          # Windows x86_64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: scribe-windows-x86_64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux only)
        if: matrix.os == 'ubuntu-24.04'
        run: sudo apt-get install -y musl-tools

      - name: Cache Cargo registry and build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ matrix.target }}-cargo-

      - name: Set version in Cargo.toml
        # Stamps the release version into the manifest so the binary reports
        # the correct version via `scribe --version`.
        run: |
          # Use a more robust sed to only match the package version line
          sed -i -E '/^version = "[0-9]+\.[0-9]+\.[0-9]+"/s/version = ".+"/version = "${{ needs.preflight.outputs.version }}"/' Cargo.toml

      - name: Build release binary (with MCP and sync features)
        run: |
          cargo build \
            --release \
            --locked \
            --features mcp,sync \
            --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          if [ "${{ runner.os }}" == "Windows" ]; then
            cp target/${{ matrix.target }}/release/scribe.exe ${{ matrix.artifact }}
          else
            cp target/${{ matrix.target }}/release/scribe ${{ matrix.artifact }}
          fi

      - name: Upload binary artefact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: [preflight, build]
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout main (for release notes context)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Download all build artefacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Generate SHA-256 checksums
        working-directory: dist
        run: |
          sha256sum scribe-linux-x86_64 scribe-macos-aarch64 scribe-windows-x86_64.exe \
            > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.preflight.outputs.version }}
          name: v${{ needs.preflight.outputs.version }}
          body: |
            ## Installation

            Download the binary for your platform, make it executable, and move it onto your `$PATH`.

            ```sh
            # macOS (Apple Silicon)
            curl -Lo scribe https://github.com/${{ github.repository }}/releases/download/v${{ needs.preflight.outputs.version }}/scribe-macos-aarch64
            chmod +x scribe && sudo mv scribe /usr/local/bin/

            # Linux (x86_64)
            curl -Lo scribe https://github.com/${{ github.repository }}/releases/download/v${{ needs.preflight.outputs.version }}/scribe-linux-x86_64
            chmod +x scribe && sudo mv scribe /usr/local/bin/
            ```

            ## Shell completions

            ```sh
            # zsh
            scribe completions zsh > ~/.zfunc/_scribe

            # zsh with Zim
            scribe completions zsh >! ~/.zim/modules/zsh-completions/src/_scribe
            rm -f ~/.zcompdump ~/.zcompdump.dat ~/.zcompdump.zwc && zimfw build

            # fish
            scribe completions fish > ~/.config/fish/completions/scribe.fish

            # bash
            scribe completions bash >> ~/.bash_completion
            ```

            ## MCP server

            This binary is built with the `mcp` and `sync` features. Run `scribe mcp` to start the
            MCP stdio server and connect it to your AI agent.

            ## Checksums

            Verify the checksum of the downloaded binary:

            ```sh
            echo "<checksum>  scribe" | sha256sum -c
            ```

            (Replace `<checksum>` with the corresponding value from `SHA256SUMS.txt`.)
          files: |
            dist/scribe-linux-x86_64
            dist/scribe-macos-aarch64
            dist/scribe-windows-x86_64.exe
            dist/SHA256SUMS.txt
          fail_on_unmatched_files: true
          make_latest: true
